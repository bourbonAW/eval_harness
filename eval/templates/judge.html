<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stage 4/5 — Judge 结果</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #f4f2ee;
      --surface:     #ffffff;
      --surface-2:   #faf9f7;
      --border:      #e8e3da;
      --border-soft: #f0ece4;
      --text:        #1c1a17;
      --text-2:      #6b6356;
      --text-3:      #a8a099;

      --pass:        #16a34a;  --pass-light: #f0fdf4; --pass-mid: #dcfce7; --pass-border: #86efac;
      --fail:        #dc2626;  --fail-light: #fef2f2; --fail-mid: #fee2e2; --fail-border: #fca5a5;
      --skip:        #c2690a;  --skip-light: #fff7ed; --skip-mid: #fed7aa; --skip-border: #fdba74;
      --blue:        #2563eb;  --blue-light: #eff6ff; --blue-border: #bfdbfe;
      --none-mid:    #f1f0ed;  --none-border: #e8e3da;

      --radius: 8px;
      --sidebar-w: 380px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
    }

    /* ── Layout ───────────────────────────────────────── */
    .layout { display: grid; grid-template-columns: 1fr var(--sidebar-w); height: 100vh; }
    .main { overflow-y: auto; padding: 24px 28px; }

    /* ── Header ───────────────────────────────────────── */
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .header-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-3);
    }
    .validation-stats {
      display: flex; align-items: center; gap: 0; flex-wrap: wrap;
      font-size: 12px; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 0; margin: 6px 0 0;
    }
    .stat-group {
      display: flex; align-items: center; gap: 8px;
      padding: 0 14px; border-right: 1px solid var(--border);
    }
    .stat-group:last-child { border-right: none; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; opacity: .6; }
    .stat-val { font-weight: 700; font-size: 13px; color: var(--text); }
    .stat-val.tp { color: var(--pass); }
    .stat-val.fp { color: #e67e22; }
    .stat-val.fn { color: var(--fail); }
    .stat-val.tn { color: var(--text-muted); }
    .stat-val.f1-good { color: var(--pass); }
    .stat-val.f1-ok   { color: #e67e22; }
    .stat-val.f1-bad  { color: var(--fail); }
    .stat-pending { font-size: 12px; color: var(--text-muted); padding: 0 14px; }
    .agreement-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-3);
    }
    .agreement-badge .agree-num { color: var(--pass); font-weight: 700; }
    .agreement-badge .disagree-num { color: var(--fail); font-weight: 700; }

    /* ── Strip ─────────────────────────────────────────── */
    .strip { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
    .chip {
      padding: 4px 8px; border-radius: 4px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 600; letter-spacing: .05em;
      border: 1.5px solid var(--none-border);
      background: linear-gradient(to right, var(--chip-l, var(--none-mid)) 0% 50%, var(--chip-r, var(--none-mid)) 50% 100%);
      color: var(--text-2);
      transition: opacity .12s, transform .08s;
      position: relative;
    }
    .chip:active { transform: scale(.96); }
    .chip.current { outline: 2px solid var(--blue); outline-offset: 1px; }
    .chip:hover { opacity: .75; }

    /* ── Divider / trace-id ───────────────────────────── */
    .divider { height: 1px; background: var(--border); margin-bottom: 18px; }
    .trace-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 600; letter-spacing: .1em; color: var(--text-3); margin-bottom: 12px;
    }

    /* ── Panels ───────────────────────────────────────── */
    .panel {
      background: var(--surface); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 10px;
      border: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .panel-q  { border-left: 3px solid var(--blue); }
    .panel-a  { border-left: 3px solid var(--pass); }
    .panel-ex { border-left: 3px solid var(--border); opacity: .7; }
    .panel-lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; margin-bottom: 8px;
    }
    .panel-q  .panel-lbl { color: var(--blue); }
    .panel-a  .panel-lbl { color: var(--pass); }
    .panel-ex .panel-lbl { color: var(--text-3); }
    .panel-body { font-size: 14px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }
    .panel-ex .panel-body { font-size: 13px; color: var(--text-2); }

    details { margin-bottom: 6px; }
    details summary {
      cursor: pointer; font-size: 11px; color: var(--text-3);
      padding: 5px 0; list-style: none;
      display: flex; align-items: center; gap: 5px; user-select: none;
    }
    details summary::before { content: '▶'; font-size: 7px; transition: transform .15s; }
    details[open] summary::before { transform: rotate(90deg); }
    details summary::-webkit-details-marker { display: none; }
    .details-body {
      background: var(--surface-2); border-radius: 6px; padding: 10px 12px;
      border: 1px solid var(--border-soft); margin-top: 4px;
      font-size: 13px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; color: var(--text-2);
    }

    .refs { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; }
    .refs a {
      font-size: 11px; color: var(--blue); text-decoration: none;
      padding: 3px 8px; border-radius: 4px;
      background: var(--blue-light); border: 1px solid var(--blue-border); transition: opacity .12s;
    }
    .refs a:hover { opacity: .7; }

    /* ═══════════════════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════════════════ */
    .sidebar {
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
    }
    #panel-form { display: flex; flex-direction: column; height: 100%; padding: 20px 18px; gap: 16px; }

    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--text-3); margin-bottom: 8px;
    }

    /* ── Verdict badge ─────────────────────────────────── */
    .verdict-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .verdict-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 4px; border: 1.5px solid;
    }
    .verdict-badge.pass { background: var(--pass-mid); color: var(--pass); border-color: var(--pass-border); }
    .verdict-badge.fail { background: var(--fail-mid); color: var(--fail); border-color: var(--fail-border); }
    .verdict-badge.skip { background: var(--skip-mid); color: var(--skip); border-color: var(--skip-border); }
    .verdict-badge.none { background: var(--none-mid); color: var(--text-3); border-color: var(--none-border); }

    .agree-chip {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px;
    }
    .agree-chip.agree   { background: var(--pass-light); color: var(--pass); }
    .agree-chip.disagree { background: var(--fail-light); color: var(--fail); }

    /* ── Human section ─────────────────────────────────── */
    .human-section {}
    .human-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .failure-cat {
      font-size: 11px; color: var(--text-3); padding: 3px 8px;
      border-radius: 4px; background: var(--fail-light); border: 1px solid var(--fail-border);
      font-family: 'JetBrains Mono', monospace;
    }

    .critique-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
    .critique-item {
      font-size: 13px; line-height: 1.6; padding: 7px 10px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text-2);
      position: relative; padding-left: 20px;
    }
    .critique-item::before {
      content: '•'; position: absolute; left: 8px; color: var(--text-3); font-size: 14px;
    }
    .muted-msg {
      font-size: 12px; color: var(--text-3); font-style: italic; padding: 6px 0;
    }

    /* ── Judge section ─────────────────────────────────── */
    .judge-section {}
    .judge-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-3); margin-bottom: 8px;
    }
    .dim-block { border-left: 2px solid var(--border); padding: 8px 0 8px 10px; margin-top: 10px; }
    .dim-block:first-of-type { margin-top: 4px; }
    .dim-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .dim-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); }
    .dim-model { font-size: 10px; color: var(--text-muted); margin-left: auto; }
    .judge-critique {
      font-size: 13px; line-height: 1.7; color: var(--text-2);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 12px; margin-bottom: 8px;
    }
    .evidence-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
    .evidence-item {
      font-size: 12px; line-height: 1.55; padding: 6px 10px;
      border-radius: 5px; border: 1px solid var(--blue-border);
      background: var(--blue-light); color: var(--text-2);
      position: relative; padding-left: 20px;
    }
    .evidence-item::before {
      content: '"'; position: absolute; left: 8px; color: var(--blue); font-size: 13px; font-weight: 700;
    }

    /* ── Loading spinner ───────────────────────────────── */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { font-size: 13px; color: var(--text-3); }

    /* ── Spacer + actions ─────────────────────────────── */
    .spacer { flex: 1; min-height: 12px; }
    .actions-section { border-top: 1px solid var(--border-soft); padding-top: 14px; }

    .model-select {
      width: 100%; padding: 8px 10px; font-size: 12px;
      border: 1.5px solid var(--border); border-radius: 6px;
      background: var(--surface-2); color: var(--text-2);
      font-family: 'JetBrains Mono', monospace;
      outline: none; margin-bottom: 8px; cursor: pointer;
    }
    .model-select:focus { border-color: var(--blue); }

    .run-btn {
      width: 100%; padding: 14px; font-size: 14px; font-weight: 700;
      background: var(--blue); color: #fff; border: none;
      border-radius: var(--radius); cursor: pointer; font-family: inherit;
      box-shadow: 0 3px 10px rgba(37,99,235,.30); transition: all .14s;
      margin-bottom: 6px; letter-spacing: .01em;
    }
    .run-btn:hover:not(:disabled) { background: #1d4ed8; box-shadow: 0 5px 16px rgba(37,99,235,.38); transform: translateY(-1px); }
    .run-btn:active:not(:disabled) { transform: translateY(0); }
    .run-btn:disabled { opacity: .55; cursor: not-allowed; }

    .run-all-btn {
      width: 100%; padding: 9px; font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border); background: var(--surface-2);
      cursor: pointer; border-radius: var(--radius); color: var(--text-2);
      font-family: inherit; transition: all .12s; margin-bottom: 8px;
    }
    .run-all-btn:hover:not(:disabled) { background: var(--bg); }
    .run-all-btn:disabled { opacity: .5; cursor: not-allowed; }

    .nav-btns { display: flex; gap: 6px; }
    .nav-btns button {
      flex: 1; padding: 9px; font-size: 16px;
      border: 1.5px solid var(--border); background: var(--surface-2);
      cursor: pointer; border-radius: var(--radius); color: var(--text-2); transition: all .12s;
    }
    .nav-btns button:hover { background: var(--bg); }

    .hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--text-3); letter-spacing: .03em; line-height: 1.8;
    }

    /* ── Toast ─────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      padding: 9px 16px; border-radius: 8px; font-size: 13px;
      display: none; z-index: 100; border: 1px solid; box-shadow: 0 4px 16px rgba(0,0,0,.12);
      font-family: 'JetBrains Mono', monospace;
    }
    .toast.show  { display: block; }
    .toast.error   { background: var(--fail-light); color: var(--fail); border-color: var(--fail-border); }
    .toast.success { background: var(--pass-light); color: var(--pass); border-color: var(--pass-border); }

    /* ── Rubric editor modal ───────────────────────── */
    .rubric-btn {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text-2);
      cursor: pointer;
      transition: all .12s;
      font-family: inherit;
    }
    .rubric-btn:hover { border-color: var(--blue); color: var(--blue); }

    .rubric-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .rubric-overlay.open { display: flex; }

    .rubric-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: min(680px, 96vw);
      max-height: 86vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 34px rgba(0,0,0,.2);
      overflow: hidden;
    }
    .rubric-modal-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rubric-modal-title { font-size: 14px; font-weight: 700; flex: 1; }
    .rubric-dim-select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 12px;
      color: var(--text-2);
      font-family: 'JetBrains Mono', monospace;
    }
    .rubric-close {
      color: var(--text-3);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      border: none;
      background: none;
      padding: 0 2px;
    }
    .rubric-close:hover { color: var(--text); }

    .rubric-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    .rubric-tab {
      padding: 9px 16px;
      font-size: 12px;
      color: var(--text-2);
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      transition: color .12s;
      background: none;
      font-family: inherit;
    }
    .rubric-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .rubric-tab.ai-tab { color: #6d28d9; }
    .rubric-tab.ai-tab.active { border-bottom-color: #6d28d9; }

    .rubric-tab-panel { display: none; padding: 14px 16px; overflow-y: auto; flex: 1; min-height: 280px; }
    .rubric-tab-panel.active { display: block; }

    .rubric-field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .rubric-textarea {
      width: 100%;
      min-height: 260px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      color: var(--text);
      line-height: 1.65;
      resize: vertical;
      font-family: inherit;
      outline: none;
    }
    .rubric-textarea:focus { border-color: var(--blue); }
    .rubric-char-count { font-size: 10px; color: var(--text-3); text-align: right; margin-top: 4px; }

    .rubric-fs-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .rubric-fs-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .rubric-fs-header { display: flex; align-items: center; gap: 8px; }
    .rubric-fs-q { font-size: 12px; color: var(--text); flex: 1; min-width: 0; overflow-wrap: anywhere; }
    .rubric-fs-critique { font-size: 11px; color: var(--text-2); margin-top: 5px; line-height: 1.45; }
    .rubric-fs-del {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-3);
      cursor: pointer;
    }
    .rubric-fs-del:hover { background: var(--fail-light); border-color: var(--fail-border); color: var(--fail); }

    .rubric-add-btn {
      width: 100%;
      background: var(--surface-2);
      border: 1px dashed var(--border);
      border-radius: 6px;
      padding: 9px;
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
      cursor: pointer;
      font-family: inherit;
    }
    .rubric-add-btn:hover { border-color: var(--blue); color: var(--blue); }

    .rubric-ai-desc { font-size: 12px; color: var(--text-2); line-height: 1.6; margin-bottom: 12px; }
    .rubric-ai-run-btn {
      width: 100%;
      padding: 10px;
      background: var(--blue);
      border-radius: 6px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
      font-family: inherit;
    }
    .rubric-ai-run-btn:disabled { opacity: .55; cursor: not-allowed; }
    .rubric-stale-banner {
      background: #fef3c7;
      border: 1px solid #fbbf24;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: #92400e;
      margin-bottom: 10px;
    }
    .rubric-suggestion {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .rubric-suggestion-tag {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: .05em;
      margin-right: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .rubric-suggestion-tag.sys { background: #dbeafe; color: #1d4ed8; }
    .rubric-suggestion-tag.fewshot { background: #eef2ff; color: #4338ca; }
    .rubric-suggestion-desc { font-size: 12px; color: var(--text); line-height: 1.5; margin-top: 5px; }
    .rubric-suggestion-actions { display: flex; gap: 6px; margin-top: 8px; }
    .rubric-adopt-btn,
    .rubric-reject-btn {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    .rubric-adopt-btn { background: var(--pass-light); border: 1px solid var(--pass-border); color: var(--pass); }
    .rubric-reject-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-3); }
    .rubric-suggestion.adopted { opacity: .48; }

    .rubric-modal-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: var(--surface-2);
    }
    .rubric-cancel-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
    }
    .rubric-save-btn {
      background: var(--blue);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 5px;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .rubric-save-btn.dirty { box-shadow: 0 0 0 3px var(--blue-light); }

    /* Page navigation FAB */
    .page-nav-fab {
      position: fixed;
      bottom: 20px;
      right: calc(var(--sidebar-w) + 16px);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 3px 14px rgba(0,0,0,.13);
      display: flex;
      gap: 3px;
      z-index: 50;
    }
    .page-nav-fab span,
    .page-nav-fab a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 5px;
      letter-spacing: .04em;
      text-decoration: none;
      transition: all .12s;
    }
    .page-nav-fab .fab-active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 1px 5px rgba(37,99,235,.3);
    }
    .page-nav-fab a.fab-link {
      color: var(--text-2);
    }
    .page-nav-fab a.fab-link:hover {
      background: var(--bg);
      color: var(--text);
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── Left: trace content ─────────────────────── -->
  <div class="main">
    <div class="header">
      <span class="header-label">Eval · Stage 4/5 Judge</span>
      <button class="rubric-btn" onclick="openRubric()">✎ 编辑 Rubric</button>
    </div>
    <div class="strip" id="strip"></div>
    <div id="validationStats"></div>
    <div class="divider"></div>
    <div id="detail">加载中...</div>
  </div>

  <!-- ── Right: sidebar ─────────────────────────── -->
  <div class="sidebar">
    <div id="panel-form">

      <!-- Human annotation -->
      <div class="human-section">
        <div class="section-title">人工标注</div>
        <div id="humanContent"><span class="muted-msg">加载中…</span></div>
      </div>

      <!-- Judge result -->
      <div class="judge-section">
        <div class="section-title">Judge 判定</div>
        <div id="judgeContent"><span class="muted-msg">未运行</span></div>
      </div>

      <div class="spacer"></div>

      <!-- Actions -->
      <div class="actions-section">
        <select class="model-select" id="modelSelect">
          {% set model_options = ["mimo-v2.5-pro", "mimo-v2.5", "mimo-v2-omni", "mimo-v2-pro"] %}
          {% if judge_model not in model_options %}
          <option value="{{ judge_model }}" selected>{{ judge_model }}</option>
          {% endif %}
          {% for model in model_options %}
          <option value="{{ model }}" {% if model == judge_model %}selected{% endif %}>{{ model }}</option>
          {% endfor %}
        </select>
        <button class="run-btn" id="runBtn" onclick="runJudge()">运行 Judge ↵</button>
        <button class="run-all-btn" id="runAllBtn" onclick="runAll()">批量运行未 Judge 的 [R]</button>
        <div class="nav-btns">
          <button onclick="navigate(-1)">←</button>
          <button onclick="navigate(1)">→</button>
        </div>
        <div class="hint" style="margin-top:10px">
          ←/→ 切换 · Enter 运行 Judge · R 批量运行
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="rubric-overlay" id="rubricOverlay" onclick="onOverlayClick(event)">
  <div class="rubric-modal">
    <div class="rubric-modal-header">
      <span class="rubric-modal-title">Rubric 编辑器</span>
      <select class="rubric-dim-select" id="rubricDimSelect" onchange="onDimChange()">
        <option value="answer_relevance">answer_relevance</option>
        <option value="faithfulness">faithfulness</option>
      </select>
      <button class="rubric-close" onclick="closeRubric()">✕</button>
    </div>
    <div class="rubric-tabs">
      <button class="rubric-tab active" onclick="switchRubricTab(0)">评判标准</button>
      <button class="rubric-tab" onclick="switchRubricTab(1)">Few-shot 例子</button>
      <button class="rubric-tab ai-tab" onclick="switchRubricTab(2)">✦ AI 分析</button>
    </div>
    <div class="rubric-tab-panel active" id="rubricTab0">
      <div class="rubric-field-label">SYSTEM PROMPT</div>
      <textarea class="rubric-textarea" id="rubricPromptTA" oninput="onPromptInput()"></textarea>
      <div class="rubric-char-count" id="rubricCharCount">0 字符</div>
    </div>
    <div class="rubric-tab-panel" id="rubricTab1">
      <div class="rubric-fs-list" id="rubricFsList"></div>
      <button class="rubric-add-btn" onclick="openAddFromTraces()">+ 从标注 traces 中添加例子</button>
    </div>
    <div class="rubric-tab-panel" id="rubricTab2">
      <div class="rubric-ai-desc">分析当前维度的 FP/FN 失误案例，自动生成 system prompt 和 few-shot 改进建议。</div>
      <button class="rubric-ai-run-btn" id="rubricAiBtn" onclick="runSuggest()">✦ 一键分析 FP/FN → 生成改进建议</button>
      <div id="rubricStaleBanner" class="rubric-stale-banner" style="display:none">
        部分 judge 结果早于当前 rubric，建议先 Run All 再分析
      </div>
      <div id="rubricSuggestions"></div>
    </div>
    <div class="rubric-modal-footer">
      <button class="rubric-cancel-btn" onclick="closeRubric()">取消</button>
      <button class="rubric-save-btn" id="rubricSaveBtn" onclick="saveRubric()">保存 Rubric</button>
    </div>
  </div>
</div>

<script>
let traces = [];
let currentIndex = 0;
let running = false;

async function init() {
  const resp = await fetch('/api/traces');
  traces = await resp.json();
  renderStrip();
  renderDetail(0);
  renderSidebar(0);
  updateValidationStats();
}

// ── Color helpers ────────────────────────────────────────

function labelMid(label) {
  return label === 'pass' ? 'var(--pass-mid)'
       : label === 'fail' ? 'var(--fail-mid)'
       : label === 'skip' ? 'var(--skip-mid)'
       : 'var(--none-mid)';
}
function labelBorder(label) {
  return label === 'pass' ? 'var(--pass-border)'
       : label === 'fail' ? 'var(--fail-border)'
       : label === 'skip' ? 'var(--skip-border)'
       : 'var(--none-border)';
}

// ── Strip ──────────────────────────────────────────────

function renderStrip() {
  const strip = document.getElementById('strip');
  strip.innerHTML = '';
  traces.forEach((entry, i) => {
    const hl = entry.human_annotation?.label;
    const jl = entry.judge_result?.label;
    const chip = document.createElement('div');
    chip.className = 'chip' + (i === currentIndex ? ' current' : '');
    chip.textContent = entry.trace.id;
    chip.style.setProperty('--chip-l', labelMid(hl));
    chip.style.setProperty('--chip-r', labelMid(jl));
    chip.style.borderColor = labelBorder(hl || jl);
    chip.onclick = () => goto(i);
    chip.title = `人工: ${hl || '未标注'} / Judge: ${jl || '未运行'}`;
    strip.appendChild(chip);
  });
}

// ── Agreement badge ────────────────────────────────────

function updateValidationStats() {
  const el = document.getElementById('validationStats');
  const judged = traces.filter(e => e.judge_result && e.human_annotation);
  const total = traces.length;
  const run = traces.filter(e => e.judge_result).length;

  if (judged.length === 0) {
    el.innerHTML = `<div class="validation-stats"><span class="stat-pending">已运行 ${run}/${total} — 运行 Judge 后显示 Stage 5 验证指标</span></div>`;
    return;
  }

  let tp = 0, fp = 0, fn = 0, tn = 0;
  judged.forEach(e => {
    const j = e.judge_result.label, h = e.human_annotation.label;
    if (j === 'fail' && h === 'fail') tp++;
    else if (j === 'fail' && h === 'pass') fp++;
    else if (j === 'pass' && h === 'fail') fn++;
    else tn++;
  });

  const precision = (tp + fp) > 0 ? tp / (tp + fp) : 0;
  const recall    = (tp + fn) > 0 ? tp / (tp + fn) : 0;
  const f1        = (precision + recall) > 0 ? 2 * precision * recall / (precision + recall) : 0;
  const pct = v => Math.round(v * 100);
  const f1cls = f1 >= 0.7 ? 'f1-good' : f1 >= 0.5 ? 'f1-ok' : 'f1-bad';

  el.innerHTML = `<div class="validation-stats">
    <div class="stat-group">
      <span class="stat-label">运行</span>
      <span class="stat-val">${run}/${total}</span>
    </div>
    <div class="stat-group">
      <span class="stat-label">TP</span><span class="stat-val tp">${tp}</span>
      <span class="stat-label">TN</span><span class="stat-val tn">${tn}</span>
      <span class="stat-label">FP</span><span class="stat-val fp">${fp}</span>
      <span class="stat-label">FN</span><span class="stat-val fn">${fn}</span>
    </div>
    <div class="stat-group">
      <span class="stat-label">Precision</span><span class="stat-val">${pct(precision)}%</span>
    </div>
    <div class="stat-group">
      <span class="stat-label">Recall</span><span class="stat-val">${pct(recall)}%</span>
    </div>
    <div class="stat-group">
      <span class="stat-label">F1</span><span class="stat-val ${f1cls}">${pct(f1)}%</span>
    </div>
  </div>`;
}

// ── Detail panel ───────────────────────────────────────

function renderDetail(idx) {
  const entry = traces[idx];
  if (!entry) return;
  const t = entry.trace;
  let html = `<div class="trace-id">TRACE · ${t.id}</div>`;

  // Question
  html += `<div class="panel panel-q"><div class="panel-lbl">问题</div><div class="panel-body">${esc(t.question)}</div></div>`;

  // Complete question (if different)
  if (t.complete_question && t.complete_question !== t.question) {
    html += `<details><summary>检索 Query</summary><div class="details-body">${esc(t.complete_question)}</div></details>`;
  }

  // Context
  if (t.doc_context) {
    html += `<details><summary>文档 Context</summary><div class="details-body">${esc(t.doc_context)}</div></details>`;
  }
  if (t.faq_context) {
    html += `<details><summary>FAQ Context</summary><div class="details-body">${esc(t.faq_context)}</div></details>`;
  }

  // References
  if (t.references && t.references.length) {
    html += `<div class="refs">`;
    t.references.forEach(r => {
      html += `<a href="${esc(r.url)}" target="_blank">${esc(r.name)}</a>`;
    });
    html += `</div>`;
  }

  // Bot answer
  html += `<div class="panel panel-a"><div class="panel-lbl">Bot 回复</div><div class="panel-body">${esc(t.actual_answer)}</div></div>`;

  // Expected answer
  if (entry.expected_answer) {
    html += `<div class="panel panel-ex"><div class="panel-lbl">参考答案（仅供参考）</div><div class="panel-body">${esc(entry.expected_answer)}</div></div>`;
  }

  document.getElementById('detail').innerHTML = html;
}

// ── Sidebar ─────────────────────────────────────────────

function renderSidebar(idx) {
  const entry = traces[idx];
  if (!entry) return;
  renderHuman(entry);
  renderJudge(entry);
}

function renderHuman(entry) {
  const ann = entry.human_annotation;
  const el = document.getElementById('humanContent');
  if (!ann) {
    el.innerHTML = '<span class="muted-msg">未标注</span>';
    return;
  }
  let html = `<div class="verdict-row">`;
  html += `<span class="verdict-badge ${ann.label}">${ann.label.toUpperCase()}</span>`;
  if (ann.failure_category) {
    html += `<span class="failure-cat">${esc(ann.failure_category)}</span>`;
  }
  html += `</div>`;
  if (ann.critique) {
    const items = ann.critique.split('\n').filter(Boolean);
    html += `<ul class="critique-list" style="margin-top:8px">`;
    items.forEach(it => {
      html += `<li class="critique-item">${esc(it)}</li>`;
    });
    html += `</ul>`;
  }
  el.innerHTML = html;
}

function renderJudge(entry) {
  const jr = entry.judge_result;
  const el = document.getElementById('judgeContent');
  if (!jr) {
    el.innerHTML = '<span class="muted-msg">未运行</span>';
    return;
  }
  const dim = jr.dimensions?.[0];
  const humanLabel = entry.human_annotation?.label;
  const agree = humanLabel ? jr.label === humanLabel : null;

  let html = `<div class="verdict-row">`;
  html += `<span class="verdict-badge ${jr.label}">${jr.label.toUpperCase()}</span>`;
  if (agree !== null) {
    html += `<span class="agree-chip ${agree ? 'agree' : 'disagree'}">${agree ? '✓ 与人工一致' : '✗ 与人工不一致'}</span>`;
  }
  html += `</div>`;

  const dims = jr.dimensions || [];
  dims.forEach(d => {
    html += `<div class="dim-block">`;
    html += `<div class="dim-header">`;
    html += `<span class="dim-name">${esc(d.dimension)}</span>`;
    html += `<span class="verdict-badge ${d.label}" style="font-size:11px;padding:1px 7px">${d.label.toUpperCase()}</span>`;
    html += `<span class="dim-model">${esc(d.model)}</span>`;
    html += `</div>`;
    if (d.critique) {
      html += `<div class="judge-critique">${esc(d.critique)}</div>`;
    }
    if (d.evidence && d.evidence.length) {
      html += `<ul class="evidence-list">`;
      d.evidence.forEach(e => { html += `<li class="evidence-item">${esc(e)}</li>`; });
      html += `</ul>`;
    }
    html += `</div>`;
  });
  el.innerHTML = html;
}

// ── Run judge ─────────────────────────────────────────

async function runJudge() {
  if (running) return;
  const entry = traces[currentIndex];
  const model = document.getElementById('modelSelect').value;

  setRunning(true);
  document.getElementById('judgeContent').innerHTML =
    `<span class="loading-msg"><span class="spinner"></span>Judge 运行中…</span>`;

  try {
    const resp = await fetch('/api/judge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ trace_id: entry.trace.id, model }),
    });
    if (!resp.ok) throw new Error(await resp.text());
    const result = await resp.json();
    traces[currentIndex].judge_result = result;
    renderJudge(traces[currentIndex]);
    renderStrip();
    updateValidationStats();
    showToast('Judge 完成', 'success');
  } catch (e) {
    showToast('运行失败: ' + e.message, 'error');
    document.getElementById('judgeContent').innerHTML = '<span class="muted-msg">运行失败</span>';
  } finally {
    setRunning(false);
  }
}

async function runAll() {
  if (running) return;
  const pending = traces
    .map((e, i) => ({ entry: e, i }))
    .filter(({ entry }) => !entry.judge_result);

  if (pending.length === 0) {
    showToast('全部已 Judge', 'success');
    return;
  }

  const model = document.getElementById('modelSelect').value;
  setRunning(true);
  document.getElementById('runAllBtn').textContent = `批量运行中 0/${pending.length}…`;

  for (let n = 0; n < pending.length; n++) {
    const { entry, i } = pending[n];
    document.getElementById('runAllBtn').textContent = `批量运行中 ${n + 1}/${pending.length}…`;

    try {
      const resp = await fetch('/api/judge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ trace_id: entry.trace.id, model }),
      });
      if (!resp.ok) throw new Error(await resp.text());
      const result = await resp.json();
      traces[i].judge_result = result;
      renderStrip();
      updateValidationStats();
      if (i === currentIndex) renderJudge(traces[currentIndex]);
    } catch (e) {
      showToast(`q_${entry.trace.id} 失败: ${e.message}`, 'error');
    }
  }

  setRunning(false);
  document.getElementById('runAllBtn').textContent = '批量运行未 Judge 的 [R]';
  showToast(`批量完成: ${pending.length} 条`, 'success');
}

// ── Navigation ─────────────────────────────────────────

function goto(idx) {
  currentIndex = idx;
  renderStrip();
  renderDetail(idx);
  renderSidebar(idx);
}

function navigate(dir) {
  const next = (currentIndex + dir + traces.length) % traces.length;
  goto(next);
}

// ── Helpers ────────────────────────────────────────────

function setRunning(val) {
  running = val;
  document.getElementById('runBtn').disabled = val;
  document.getElementById('runAllBtn').disabled = val;
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => { t.className = 'toast'; }, 2800);
}

// ── Rubric editor ───────────────────────────────────────

let _rubricDim = 'answer_relevance';
let _rubricDirty = false;
let _rubricFewShot = [];
let _rubricPrompt = '';
let _suggestions = [];

function setRubricDirty(val) {
  _rubricDirty = val;
  document.getElementById('rubricSaveBtn')?.classList.toggle('dirty', val);
}

function openRubric() {
  _rubricDim = document.getElementById('rubricDimSelect').value;
  document.getElementById('rubricOverlay').classList.add('open');
  switchRubricTab(0);
  loadRubric(_rubricDim);
}

function closeRubric() {
  if (_rubricDirty && !confirm('当前修改未保存，确认关闭？')) return;
  document.getElementById('rubricOverlay').classList.remove('open');
  setRubricDirty(false);
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('rubricOverlay')) closeRubric();
}

function switchRubricTab(n) {
  document.querySelectorAll('.rubric-tab').forEach((t, i) => t.classList.toggle('active', i === n));
  document.querySelectorAll('.rubric-tab-panel').forEach((p, i) => p.classList.toggle('active', i === n));
}

function onDimChange() {
  if (_rubricDirty && !confirm('当前修改未保存，确认切换维度？')) {
    document.getElementById('rubricDimSelect').value = _rubricDim;
    return;
  }
  _rubricDim = document.getElementById('rubricDimSelect').value;
  setRubricDirty(false);
  loadRubric(_rubricDim);
}

async function loadRubric(dim) {
  try {
    const resp = await fetch(`/api/rubric/${dim}`);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || resp.status);
    _rubricPrompt = data.system_prompt || '';
    _rubricFewShot = data.few_shot || [];
    document.getElementById('rubricPromptTA').value = _rubricPrompt;
    document.getElementById('rubricCharCount').textContent = `${_rubricPrompt.length} 字符`;
    renderFewShot();
    document.getElementById('rubricSuggestions').innerHTML = '';
    document.getElementById('rubricStaleBanner').style.display = 'none';
    _suggestions = [];
    setRubricDirty(false);
  } catch (e) {
    showToast('Rubric 加载失败: ' + e.message, 'error');
  }
}

function onPromptInput() {
  _rubricPrompt = document.getElementById('rubricPromptTA').value;
  document.getElementById('rubricCharCount').textContent = `${_rubricPrompt.length} 字符`;
  setRubricDirty(true);
}

function renderFewShot() {
  const list = document.getElementById('rubricFsList');
  if (_rubricFewShot.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text-3);text-align:center;padding:12px">暂无 few-shot 例子</div>';
    return;
  }
  list.innerHTML = _rubricFewShot.map((ex, i) => {
    const vclass = ex.verdict === 'Pass' ? 'pass' : 'fail';
    const label = ex.question || ex.answer?.slice(0, 48) || '(无标题)';
    return `<div class="rubric-fs-item">
      <div class="rubric-fs-header">
        <span class="verdict-badge ${vclass}" style="font-size:11px;padding:2px 8px">${esc(ex.verdict)}</span>
        <span class="rubric-fs-q">${esc(label.slice(0, 72))}</span>
        <button class="rubric-fs-del" onclick="deleteFewShot(${i})">✕</button>
      </div>
      ${ex.critique ? `<div class="rubric-fs-critique">${esc(ex.critique.slice(0, 140))}</div>` : ''}
    </div>`;
  }).join('');
}

function deleteFewShot(i) {
  _rubricFewShot.splice(i, 1);
  setRubricDirty(true);
  renderFewShot();
}

async function openAddFromTraces() {
  const annotated = traces.filter(e => e.human_annotation && e.human_annotation.label !== 'skip');
  if (annotated.length === 0) {
    showToast('没有可用的标注 traces', 'error');
    return;
  }
  const opts = annotated
    .map((e, i) => `${i}: [${e.human_annotation.label}] ${e.trace.question?.slice(0, 50) || e.trace.id}`)
    .join('\n');
  const choice = prompt(`选择要添加的 trace（输入序号）:\n${opts}`);
  if (choice === null || choice.trim() === '') return;
  const idx = parseInt(choice, 10);
  if (Number.isNaN(idx) || idx < 0 || idx >= annotated.length) {
    showToast('无效选择', 'error');
    return;
  }

  const entry = annotated[idx];
  const ha = entry.human_annotation;
  const t = entry.trace;
  const verdict = ha.label === 'pass' ? 'Pass' : 'Fail';
  const newEx = { verdict, critique: ha.critique || '', evidence: [] };
  if (_rubricDim === 'answer_relevance') {
    newEx.question = t.question || '';
    newEx.answer = t.actual_answer || '';
  } else {
    newEx.doc_context = t.doc_context || '';
    newEx.faq_context = t.faq_context || '';
    newEx.answer = t.actual_answer || '';
  }

  _rubricFewShot.push(newEx);
  setRubricDirty(true);
  renderFewShot();
  showToast('已添加 few-shot 例子', 'success');
}

async function saveRubric() {
  const payload = { system_prompt: _rubricPrompt, few_shot: _rubricFewShot };
  try {
    const resp = await fetch(`/api/rubric/${_rubricDim}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (!resp.ok) {
      showToast('保存失败: ' + (data.error || resp.status), 'error');
      return;
    }
    setRubricDirty(false);
    showToast('Rubric 已保存', 'success');
  } catch (e) {
    showToast('保存失败: ' + e.message, 'error');
  }
}

async function runSuggest() {
  const btn = document.getElementById('rubricAiBtn');
  btn.disabled = true;
  btn.textContent = '分析中…';
  document.getElementById('rubricSuggestions').innerHTML =
    '<span style="font-size:12px;color:var(--text-3)">正在分析 FP/FN 案例…</span>';

  try {
    const resp = await fetch(`/api/rubric/${_rubricDim}/suggest`, { method: 'POST' });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || resp.status);
    document.getElementById('rubricStaleBanner').style.display = data.stale_warning ? '' : 'none';
    _suggestions = (data.suggestions || []).map(s => ({ ...s, _adopted: false }));
    if (data.fp_fn_count === 0) {
      document.getElementById('rubricSuggestions').innerHTML =
        '<div style="font-size:12px;color:var(--text-2)">当前维度无 FP/FN 失误，judge 表现良好</div>';
    } else {
      renderSuggestions(data.fp_fn_count);
    }
  } catch (e) {
    document.getElementById('rubricSuggestions').innerHTML =
      `<div style="font-size:12px;color:var(--fail)">AI 分析失败: ${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ 一键分析 FP/FN → 生成改进建议';
  }
}

function renderSuggestions(fpFnCount) {
  const el = document.getElementById('rubricSuggestions');
  if (_suggestions.length === 0) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text-2)">无具体建议</div>';
    return;
  }
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:var(--text-2)">发现 ${fpFnCount} 处 FP/FN，生成 ${_suggestions.length} 条建议</span>
      <button class="rubric-adopt-btn" onclick="adoptAll()">✓ 全部采纳</button>
    </div>
    ${_suggestions.map((s, i) => {
      const tag = s.type === 'system_prompt' ? 'sys' : 'fewshot';
      const label = s.type === 'system_prompt' ? 'SYSTEM PROMPT' : 'FEW-SHOT';
      return `<div class="rubric-suggestion ${s._adopted ? 'adopted' : ''}" id="sug${i}">
        <div><span class="rubric-suggestion-tag ${tag}">${label}</span></div>
        <div class="rubric-suggestion-desc">${esc(s.description || '')}</div>
        <div class="rubric-suggestion-actions">
          <button class="rubric-adopt-btn" onclick="adoptSuggestion(${i})">✓ 采纳</button>
          <button class="rubric-reject-btn" onclick="rejectSuggestion(${i})">✕ 忽略</button>
        </div>
      </div>`;
    }).join('')}`;
}

function adoptSuggestion(i) {
  const s = _suggestions[i];
  if (!s || s._adopted) return;
  if (s.type === 'system_prompt' && s.proposed_full) {
    _rubricPrompt = s.proposed_full;
    document.getElementById('rubricPromptTA').value = _rubricPrompt;
    document.getElementById('rubricCharCount').textContent = `${_rubricPrompt.length} 字符`;
    switchRubricTab(0);
  } else if (s.type === 'few_shot' && s.proposed_example) {
    _rubricFewShot.push(s.proposed_example);
    renderFewShot();
    switchRubricTab(1);
  }
  s._adopted = true;
  setRubricDirty(true);
  document.getElementById(`sug${i}`)?.classList.add('adopted');
}

function rejectSuggestion(i) {
  const s = _suggestions[i];
  if (s) s._adopted = true;
  document.getElementById(`sug${i}`)?.classList.add('adopted');
}

function adoptAll() {
  _suggestions.forEach((_, i) => adoptSuggestion(i));
}

// ── Keyboard ───────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (document.getElementById('rubricOverlay')?.classList.contains('open')) {
    if (e.key === 'Escape') {
      e.preventDefault();
      closeRubric();
    }
    if (!['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) e.preventDefault();
    return;
  }
  if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowLeft')  { e.preventDefault(); navigate(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); navigate(1); }
  if (e.key === 'Enter')      { e.preventDefault(); runJudge(); }
  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); runAll(); }
});

init();
</script>

    <a href="/collect" class="fab-link">← Collect</a>
    <a href="/" class="fab-link">← 标注</a>
    <span class="fab-active">Judge</span>
  </div>
</body>
</html>
